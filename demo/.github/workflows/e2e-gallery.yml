# Alternative: Upload screenshots to the PR via issue-comment images
# This version uploads screenshots as individual image attachments
# which works better for large screenshots (no base64 size limits)

name: E2E Tests with Screenshot Gallery

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Create screenshots directory
        run: mkdir -p screenshots

      - name: Run Playwright tests
        id: tests
        run: npx playwright test --project=chromium --reporter=json --output-file=results.json 2>&1 || true
        continue-on-error: true

      # Generate a markdown summary with test results
      - name: Generate test summary
        if: always()
        run: |
          node -e "
          const fs = require('fs');
          const results = JSON.parse(fs.readFileSync('results.json', 'utf8'));
          
          const passed = results.suites?.[0]?.specs?.filter(s => s.ok).length || 0;
          const failed = results.suites?.[0]?.specs?.filter(s => !s.ok).length || 0;
          const total = passed + failed;
          
          let md = '| Test | Status | Duration |\n|---|---|---|\n';
          
          for (const spec of (results.suites?.[0]?.specs || [])) {
            const status = spec.ok ? '✅ Pass' : '❌ Fail';
            const duration = spec.tests?.[0]?.results?.[0]?.duration || 0;
            md += '| ' + spec.title + ' | ' + status + ' | ' + duration + 'ms |\n';
          }
          
          fs.writeFileSync('test-summary.md', md);
          console.log('Summary: ' + passed + '/' + total + ' passed');
          "

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: screenshots/
          retention-days: 14

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      # Post a clean summary table + screenshot gallery to the PR
      - name: Comment on PR with results
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const testStatus = '${{ steps.tests.outcome }}';
            const statusEmoji = testStatus === 'success' ? '✅' : '❌';
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            // Read test summary table
            let summaryTable = '';
            if (fs.existsSync('test-summary.md')) {
              summaryTable = fs.readFileSync('test-summary.md', 'utf8');
            }

            // Count screenshots
            const screenshotDir = 'screenshots';
            let screenshotCount = 0;
            if (fs.existsSync(screenshotDir)) {
              screenshotCount = fs.readdirSync(screenshotDir).filter(f => f.endsWith('.png')).length;
            }

            let body = `## ${statusEmoji} Playwright E2E Results\n\n`;
            body += `| | |\n|---|---|\n`;
            body += `| **Status** | ${testStatus === 'success' ? 'All tests passed ✅' : 'Tests failed ❌'} |\n`;
            body += `| **Browser** | Chromium |\n`;
            body += `| **Screenshots** | ${screenshotCount} captured |\n`;
            body += `| **Commit** | \`${context.sha.substring(0, 7)}\` |\n`;
            body += `| **Run** | [View full run](${runUrl}) |\n\n`;

            if (summaryTable) {
              body += `### Test Results\n\n${summaryTable}\n`;
            }

            body += `### 📸 Screenshots\n\n`;
            body += `Screenshots are available as artifacts:\n`;
            body += `1. Go to the [workflow run](${runUrl})\n`;
            body += `2. Scroll to **Artifacts**\n`;
            body += `3. Download **e2e-screenshots** (${screenshotCount} images)\n\n`;

            body += `<details>\n<summary>📋 View Playwright HTML Report</summary>\n\n`;
            body += `Download the **playwright-report** artifact from the [workflow run](${runUrl}) and run:\n`;
            body += `\`\`\`bash\nnpx playwright show-report path/to/playwright-report\n\`\`\`\n`;
            body += `</details>\n\n`;

            body += `---\n*Generated by Playwright E2E at ${new Date().toISOString()}*`;

            // Find and update or create comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Playwright E2E Results')
            );

            const commentParams = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            };

            if (botComment) {
              await github.rest.issues.updateComment({
                ...commentParams,
                comment_id: botComment.id,
              });
            } else {
              await github.rest.issues.createComment({
                ...commentParams,
                issue_number: context.issue.number,
              });
            }

      - name: Check test outcome
        if: steps.tests.outcome == 'failure'
        run: exit 1
