# Playwright E2E — Run tests, collect screenshots, post to PR
name: E2E Tests with Screenshots

on:
  pull_request:
    branches: [main, master]

defaults:
  run:
    working-directory: demo

permissions:
  contents: read
  pull-requests: write  # Needed to post PR comments

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: demo/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Create screenshots directory
        run: mkdir -p screenshots

      - name: Run Playwright tests
        id: tests
        run: npx playwright test --project=chromium --reporter=list
        continue-on-error: true  # Don't fail yet — we want to post screenshots first

      - name: Upload screenshots as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: demo/screenshots/
          retention-days: 14

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: demo/playwright-report/
          retention-days: 14

      # Post screenshots as a PR comment
      - name: Post screenshots to PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const screenshotDir = 'demo/screenshots';
            const testStatus = '${{ steps.tests.outcome }}';
            const statusEmoji = testStatus === 'success' ? '✅' : '❌';

            // Read all screenshot files
            let screenshots = [];
            if (fs.existsSync(screenshotDir)) {
              screenshots = fs.readdirSync(screenshotDir)
                .filter(f => f.endsWith('.png'))
                .sort();
            }

            // Build the comment body
            let body = `## ${statusEmoji} E2E Test Results\n\n`;
            body += `**Status**: ${testStatus === 'success' ? 'All tests passed' : 'Some tests failed'}\n`;
            body += `**Browser**: Chromium\n`;
            body += `**Commit**: \`${context.sha.substring(0, 7)}\`\n\n`;

            if (screenshots.length > 0) {
              body += `### Screenshots (${screenshots.length})\n\n`;
              body += `> Screenshots are uploaded as artifacts. Download the \`e2e-screenshots\` artifact to view full-resolution images.\n\n`;

              // Upload each screenshot as an image in the comment
              for (const file of screenshots) {
                const filePath = path.join(screenshotDir, file);
                const imageData = fs.readFileSync(filePath, { encoding: 'base64' });
                const label = file.replace('.png', '').replace(/-/g, ' ');

                body += `<details>\n<summary>📸 ${label}</summary>\n\n`;
                body += `![${label}](data:image/png;base64,${imageData})\n\n`;
                body += `</details>\n\n`;
              }
            } else {
              body += `> No screenshots were captured.\n`;
            }

            body += `\n---\n*Generated by Playwright E2E workflow*`;

            // Find existing bot comment to update (avoid spam)
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('E2E Test Results')
            );

            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      # Fail the job if tests failed (after posting the comment)
      - name: Check test outcome
        if: steps.tests.outcome == 'failure'
        run: exit 1
