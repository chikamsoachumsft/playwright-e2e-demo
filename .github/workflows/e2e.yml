# Playwright E2E — Run tests, collect screenshots, post to PR
name: E2E Tests with Screenshots

on:
  pull_request:
    branches: [main, master]

defaults:
  run:
    working-directory: demo

permissions:
  contents: read
  pull-requests: write  # Needed to post PR comments

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: demo/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Create screenshots directory
        run: mkdir -p screenshots

      - name: Run Playwright tests
        id: tests
        run: npx playwright test --project=chromium --reporter=list
        continue-on-error: true  # Don't fail yet — we want to post screenshots first

      - name: Upload screenshots as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: demo/screenshots/
          retention-days: 14

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: demo/playwright-report/
          retention-days: 14

      # Post screenshots as a PR comment
      - name: Post screenshots to PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const screenshotDir = 'demo/screenshots';
            const testStatus = '${{ steps.tests.outcome }}';
            const statusEmoji = testStatus === 'success' ? '✅' : '❌';
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            // Read all screenshot files
            let screenshots = [];
            if (fs.existsSync(screenshotDir)) {
              screenshots = fs.readdirSync(screenshotDir)
                .filter(f => f.endsWith('.png'))
                .sort();
            }

            // Build the comment body
            let body = `## ${statusEmoji} E2E Test Results\n\n`;
            body += `| | |\n|---|---|\n`;
            body += `| **Status** | ${testStatus === 'success' ? 'All tests passed ✅' : 'Tests failed ❌'} |\n`;
            body += `| **Browser** | Chromium |\n`;
            body += `| **Screenshots** | ${screenshots.length} captured |\n`;
            body += `| **Commit** | \`${context.sha.substring(0, 7)}\` |\n`;
            body += `| **Run** | [View full run](${runUrl}) |\n\n`;

            if (screenshots.length > 0) {
              body += `### 📸 Screenshots\n\n`;
              body += `| # | Screenshot |\n|---|---|\n`;
              for (let i = 0; i < screenshots.length; i++) {
                const label = screenshots[i].replace('.png', '').replace(/-/g, ' ');
                body += `| ${i + 1} | ${label} |\n`;
              }
              body += `\n> Download the **e2e-screenshots** artifact from the [workflow run](${runUrl}) to view all images.\n\n`;
            }

            body += `<details>\n<summary>📋 View Playwright HTML Report</summary>\n\n`;
            body += `Download the **playwright-report** artifact from the [workflow run](${runUrl}) and run:\n`;
            body += `\`\`\`bash\nnpx playwright show-report path/to/playwright-report\n\`\`\`\n`;
            body += `</details>\n\n`;

            body += `---\n*Generated by Playwright E2E at ${new Date().toISOString()}*`;

            // Find existing bot comment to update (avoid spam)
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('E2E Test Results')
            );

            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      # Fail the job if tests failed (after posting the comment)
      - name: Check test outcome
        if: steps.tests.outcome == 'failure'
        run: exit 1
